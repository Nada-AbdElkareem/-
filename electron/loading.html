<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline';" />
  <title>جارٍ التحميل...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #f8fafc;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .logo-ring {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .logo-ring svg.spinner {
      position: absolute;
      inset: 0;
      animation: spin 1.5s linear infinite;
    }

    .logo-ring .icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #f1f5f9;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: -20px;
      text-align: center;
    }

    .progress-wrap {
      width: 240px;
      height: 4px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 99px;
      animation: progress 3s ease-in-out infinite alternate;
    }

    @keyframes progress {
      from { width: 15%; }
      to   { width: 90%; }
    }

    .status {
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.04em;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    .dots span {
      animation: blink 1.4s infinite;
      animation-fill-mode: both;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%           { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-ring">
      <svg class="spinner" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="44" stroke="#1e3a5f" stroke-width="6"/>
        <path d="M50 6 A44 44 0 0 1 94 50" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="icon">🏥</div>
    </div>

    <div class="title">نظام إدارة دار الضيافة الطبية</div>
    <div class="subtitle">Medical Guest House Management System</div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="status">
      جارٍ تشغيل الخادم<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>
</body>
</html>
