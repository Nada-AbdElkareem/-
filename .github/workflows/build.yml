name: Build & Release (Tauri)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    name: 🦀 Tauri — Windows Build & Release
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🦀 Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 📦 Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 📦 Install Node dependencies
        shell: bash
        run: npm ci

      - name: 🏗️ Build Vite frontend
        shell: bash
        run: npm run build:frontend
        env:
          NODE_ENV: production
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}

      - name: 🔨 Bundle Express server (esbuild)
        shell: bash
        run: npm run build:server

      - name: 📦 Compile server to standalone .exe (pkg)
        shell: bash
        run: npm run build:server:exe

      - name: ✅ Verify build outputs
        shell: bash
        run: |
          echo "=== dist/ ==="
          ls -lh dist/
          echo "=== server.exe size ==="
          du -sh dist/server.exe

      - name: 🚀 Build & Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "🏥 نظام دار الضيافة الطبية ${{ github.ref_name }}"
          releaseBody: |
            ## 🏥 نظام إدارة دار الضيافة الطبية — ${{ github.ref_name }}

            تطبيق سطح مكتب مبني بـ **Tauri** — أسرع وأخف من أي إصدار سابق.

            ### 📥 تحميل وتثبيت على Windows

            | الملف | النوع |
            |-------|-------|
            | `*_x64-setup.exe` | مثبّت كامل (موصى به) |
            | `*_x64.msi` | Windows Installer |

            ### 🚀 طريقة التثبيت
            1. حمّل ملف `*_x64-setup.exe`
            2. شغّل المثبّت واتبع الخطوات
            3. ابحث عن **Medical Guest House System** في قائمة Start

            ### ⚙️ ملاحظات
            - لا يحتاج Node.js أو أي برامج إضافية
            - الحجم ~15MB فقط
            - قاعدة البيانات تُنشأ تلقائياً عند أول تشغيل
          releaseDraft: false
          prerelease: false