name: Release — Build Electron App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # Windows Build
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2019'

      - name: Build frontend (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          GEMINI_API_KEY: placeholder

      - name: Build backend bundle (esbuild)
        run: npx esbuild server.ts --bundle --platform=node --format=cjs --packages=external --outfile=dist/server.cjs

      - name: Build Electron app (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: Get-ChildItem dist-electron -Recurse | Select-Object Name, Length

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Linux Build
  # ─────────────────────────────────────────────────────────
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build frontend (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          GEMINI_API_KEY: placeholder

      - name: Build backend bundle (esbuild)
        run: npx esbuild server.ts --bundle --platform=node --format=cjs --packages=external --outfile=dist/server.cjs

      - name: Build Electron app (Linux)
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-files/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: release-files/

      - name: List release files
        run: ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          name: "نظام دار الضيافة الطبية ${{ github.ref_name }}"
          body: |
            ## 🏥 نظام إدارة دار الضيافة الطبية ${{ github.ref_name }}

            ### التحميل
            - **Windows**: تحميل ملف `.exe` للتثبيت أو `.zip` للنسخة المحمولة
            - **Linux**: تحميل `.AppImage` أو `.deb`

            ### التغييرات
            راجع [CHANGELOG.md](./CHANGELOG.md) للتفاصيل.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
