name: CI — Build & Lint

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: 🔍 Type-check & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type-check
        run: npm run lint
        continue-on-error: false

      - name: 🏗️ Build Vite frontend
        run: npx vite build
        env:
          NODE_ENV: production
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder-for-ci' }}

      - name: 🔨 Build Express server bundle
        run: |
          npx esbuild server.ts \
            --bundle \
            --platform=node \
            --format=cjs \
            --packages=external \
            --outfile=dist/server.cjs

      - name: ✅ Verify build output
        run: |
          echo "=== Frontend dist/ ==="
          ls -la dist/
          echo ""
          echo "=== Electron files ==="
          ls -la electron/
          echo ""
          echo "=== Package version ==="
          node -e "const p=require('./package.json'); console.log('v'+p.version, '-', p.productName);"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: dist/
          retention-days: 7
